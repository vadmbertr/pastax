name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install mystmd
        run: npm install -g mystmd

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r docs/myst-requirements.txt

      - name: Build API AST (sphinx-ext-mystmd -> *.myst.json)
        run: sphinx-build -b myst docs/_sphinx docs/_sphinx/_build/myst

      - name: Build MyST site
        # GitHub Pages serves the site at https://<owner>.github.io/<repo>/,
        # so mystmd needs BASE_URL set to that path prefix; without it the
        # rendered HTML loads assets from / and shows the
        # "Site not loading correctly?" overlay.
        env:
          BASE_URL: /molisanax
        run: myst build --html --execute --strict

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
